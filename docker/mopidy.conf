[core]
cache_dir = /var/cache/mopidy
config_dir = /etc/mopidy
data_dir = /var/lib/mopidy

[file]
media_dirs = /var/lib/mopidy/media

[m3u]
base_dir = /var/lib/mopidy/media

[mpd]
hostname = 0.0.0.0
port = 6600

[http]
hostname = 0.0.0.0
port = 6680

[audio]
output = audioresample ! audioconvert ! audio/x-raw,rate=48000,channels=2,format=S16LE ! filesink location=/audio/snapfifo

[mp3quran]
enabled = true
language = English
cache_ttl = 3600
timeout = 10
validate_stream_url = false
